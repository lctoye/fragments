# .github/workflows/ci.yml
 
# Continuous Integration (CI) Workflow
name: ci
 
# This workflow will run whenever we push commits to the `main` branch, or
# whenever there's a pull request to the `main` branch.
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
 
jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
 
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
 
      - name: Install node dependencies
        run: npm ci
 
      - name: Run ESLint
        run: npm run lint
 
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
 
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
 
      - name: Install node dependencies and run Tests
        run: npm install-ci-test
 
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
 
      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
 
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v3
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/fragments
 
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: 
            ${{ secrets.DOCKER_USERNAME }}/fragments:latest
            # ${{ secrets.DOCKER_USERNAME }}/fragments:lab-6,
            # ${{ secrets.DOCKER_USERNAME }}/fragments:lab-6-step-20,
            # ${{ secrets.DOCKER_USERNAME }}/fragments:lab-6-step-21
          labels: ${{ steps.meta.outputs.labels }}
